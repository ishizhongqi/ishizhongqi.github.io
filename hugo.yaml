baseURL: shizhongqi.cn
languageCode: zh
defaultContentLanguage: zh
defaultContentLanguageInSubdir: true
theme: PaperMod
paginate: 5
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
pygmentsUseClasses: true

languages:
  en:
    languageName: English
    languageCode: en
    contentDir: content/en
    title: QiQi's Note Dock
    menu:
      main:
        - identifier: notes
          name: Notes
          url: /en/notes/
          weight: 10
        - identifier: posts
          name: Posts
          url: /en/posts/
          weight: 20
        - identifier: about
          name: About
          url: /en/about
          weight: 30
        - identifier: categories
          name: Categories
          url: /en/categories/
          weight: 40
        - identifier: tags
          name: Tags
          url: /en/tags/
          weight: 50
        - identifier: archives
          name: Archives
          url: /en/archives/
          weight: 60
        - identifier: GitHub
          name: GitHub
          url: https://github.com/ishizhongqi
          weight: 70
    params:
      profileMode:
        enabled: true
        title: QiQi's Note Dock
        subtitle: Write down what you learn !
        imageUrl: /images/pikachu.png
        imageWidth: 120
        imageHeight: 120
        imageTitle: profile image
        buttons:
          - name: My Notes
            url: notes
          - name: Linux Command
            url: linux-command

  zh:
    languageName: 中文
    languageCode: zh
    contentDir: content/zh
    title: 琪琪的笔记坞
    menu:
      main:
        - identifier: notes
          name: 笔记
          url: /zh/notes/
          weight: 10
        - identifier: posts
          name: 文章
          url: /zh/posts/
          weight: 20
        - identifier: about
          name: 关于
          url: /zh/about
          weight: 30
        - identifier: categories
          name: 分类
          url: /zh/categories/
          weight: 40
        - identifier: tags
          name: 标签
          url: /zh/tags/
          weight: 50
        - identifier: archives
          name: 归档
          url: /zh/archives/
          weight: 60
        - identifier: GitHub
          name: GitHub
          url: https://github.com/ishizhongqi
          weight: 70
    params:
      profileMode:
        enabled: true
        title: 琪琪的笔记坞
        subtitle: 学到的知识一定要用笔记下来！
        imageUrl: /images/pikachu.png
        imageWidth: 120
        imageHeight: 120
        imageTitle: profile image
        buttons:
          - name: 我的笔记
            url: notes
          - name: Linux 命令搜索
            url: linux-command

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: 琪琪的笔记坞
  description: 学到的知识一定要用笔记下来！
  keywords:
    - Linux
    - MySQL
    - vi
    - C
    - C++
  author: Shizhongqi
  images:
    - <link or path of image for opengraph, twitter-cards>
  DateFormat: January 2, 2006
  defaultTheme: auto
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: false
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false
  assets:
    favicon: /images/pikachu.png
    favicon16x16: <link / abs url>
    favicon32x32: <link / abs url>
    apple_touch_icon: <link / abs url>
    safari_pinned_tab: <link / abs url>
    disableHLJS: true
#  label:
#    text: Home
#    icon: /apple-touch-icon.png
#    iconHeight: 35
  busuanzi:
    enable: true

  socialIcons:
    - name: github
      url: https://github.com/ishizhongqi
    - name: email
      url: 'mailto: ishizhongqi@outlook.com'
    - name: qq
      url: tencent://message/?uin=1174094849&Site=&Menu=yes
    - name: wechat
      url: weixin://contacts/profile/Shi2hq
    - name: leetcode
      url: https://leetcode.com/u/Shizhongqi/
    - name: bilibili
      url: https://space.bilibili.com/244320948
    - name: x
      url: https://x.com/ishizhongqi
  analytics:
    bing:
      SiteVerificationTag: XYZabc
  cover:
    hidden: true
    hiddenInList: true
    hiddenInSingle: true
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys:
      - title
      - permalink
      - summary
      - content

markup:
  highlight:
    anchorLineNos: false
    codeFences: true
    guessSyntax: false
    hl_Lines: ""
    hl_inline: false
    lineAnchors: ""
    lineNoStart: 1
    lineNos: false
    lineNumbersInTable: true
    noClasses: false
    noHl: false
    style: abap
    tabWidth: 4
